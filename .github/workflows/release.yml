name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Lint
        run: yarn lint

      - name: Type check
        run: yarn type-check

      - name: Unit tests
        run: yarn test

      - name: Build libraries
        run: yarn build:libs

      - name: Publish to npm
        run: |
          yarn workspace @jsonui/core run npm-publish
          yarn workspace @jsonui/react run npm-publish
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build and deploy docs
        run: yarn copyDocs
        env:
          VITE_BASE_PATH: /jsonui/

      - name: Deploy docs to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          cname: jsonui.org

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          body: |
            Release of JSONUI ${{ github.ref }}

            Changes in this release:
            - See commit history for details
          draft: false
          prerelease: false

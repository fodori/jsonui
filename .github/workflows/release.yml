name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build libraries
        run: yarn build

      - name: Lint
        run: yarn lint

      - name: Type check
        run: yarn type-check

      - name: Unit tests
        run: yarn test

      - name: Publish to npm
        run: |
          yarn workspace @jsonui/core npm publish --access public
          yarn workspace @jsonui/react npm publish --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build docs
        run: yarn copyDocs

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          body: |
            Release of JSONUI ${{ github.ref }}

            Changes in this release:
            - See commit history for details
          draft: false
          prerelease: false
